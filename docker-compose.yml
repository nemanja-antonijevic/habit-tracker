services:
  mysql:
    image: mysql:8.0
    container_name: habits-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: habits
      MYSQL_USER: habits
      MYSQL_PASSWORD: habits
    volumes:
      - habits_data:/var/lib/mysql

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: habits-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  redis:
    image: redis:7
    container_name: habits-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --maxmemory-policy
      - noeviction

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - kafka
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/habits
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  habits_data:
