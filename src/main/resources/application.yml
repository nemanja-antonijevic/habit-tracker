spring:
  application:
    name: habit-tracker
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/habits
    username: habits
    password: habits
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true

server:
  port: 8080
