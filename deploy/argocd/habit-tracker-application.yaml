apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: habit-tracker
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/nemanja-antonijevic/habit-tracker.git
    targetRevision: main
    path: deploy/habit-tracker
    helm:
      releaseName: habit-tracker
      parameters:
        - name: image.tag
          value: dev
        - name: image.pullPolicy
          value: Never

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual cluster changes back to Git state
    syncOptions:
      - CreateNamespace=true
