apiVersion: v1
kind: Service
metadata:
  name: {{ include "habit-tracker.fullname" . }}-kafka
  labels:
    {{- include "habit-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  clusterIP: None
  ports:
    - name: kafka
      port: {{ .Values.kafka.service.port }}
      targetPort: kafka
      protocol: TCP
    - name: controller
      port: {{ .Values.kafka.service.controllerPort }}
      targetPort: controller
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "habit-tracker.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "habit-tracker.fullname" . }}-kafka
  labels:
    {{- include "habit-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  serviceName: {{ include "habit-tracker.fullname" . }}-kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "habit-tracker.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        {{- include "habit-tracker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kafka
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          ports:
            - name: kafka
              containerPort: {{ .Values.kafka.service.port }}
              protocol: TCP
            - name: controller
              containerPort: {{ .Values.kafka.service.controllerPort }}
              protocol: TCP
          env:
            - name: KAFKA_NODE_ID
              value: {{ .Values.kafka.config.nodeId | quote }}
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:{{ .Values.kafka.service.port }},CONTROLLER://:{{ .Values.kafka.service.controllerPort }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ include "habit-tracker.fullname" . }}-kafka:{{ .Values.kafka.service.port }}"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "{{ .Values.kafka.config.nodeId }}@{{ include "habit-tracker.fullname" . }}-kafka:{{ .Values.kafka.service.controllerPort }}"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.config.clusterId | quote }}
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size }}